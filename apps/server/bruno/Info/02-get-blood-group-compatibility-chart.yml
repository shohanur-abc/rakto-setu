info:
  name: Get blood group compatibility chart
  type: http
  seq: 2
http:
  method: GET
  url: '{{baseUrl}}/info/compatibility'
  auth: none
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
