info:
  name: Force-close a request
  type: http
  seq: 12
http:
  method: PATCH
  url: '{{baseUrl}}/admin/requests/:id/close'
  params:
  - name: id
    value: '{{requestId}}'
    type: path
  auth:
    type: bearer
    token: '{{admin.token}}'
  body:
    type: json
    data: |-
      {
        "status": "unfulfilled"
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
