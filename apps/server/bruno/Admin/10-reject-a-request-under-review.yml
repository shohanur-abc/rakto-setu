info:
  name: Reject a request under review
  type: http
  seq: 10
http:
  method: PATCH
  url: '{{baseUrl}}/admin/requests/:id/reject'
  params:
  - name: id
    value: '{{requestId}}'
    type: path
  auth:
    type: bearer
    token: '{{admin.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
