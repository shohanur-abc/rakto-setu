info:
  name: Update system settings
  type: http
  seq: 20
http:
  method: PUT
  url: '{{baseUrl}}/admin/settings'
  auth:
    type: bearer
    token: '{{admin.token}}'
  body:
    type: json
    data: |-
      {
        "donorCooldownDays": 90,
        "metadata": {
          "locale": "bn"
        }
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
