info:
  name: Read system settings
  type: http
  seq: 19
http:
  method: GET
  url: '{{baseUrl}}/admin/settings'
  auth:
    type: bearer
    token: '{{token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
