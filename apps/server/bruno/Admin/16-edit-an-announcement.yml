info:
  name: Edit an announcement
  type: http
  seq: 16
http:
  method: PUT
  url: '{{baseUrl}}/admin/announcements/:id'
  params:
  - name: id
    value: '{{announcementId}}'
    type: path
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |-
      {
        "title": "Updated donation camp",
        "body": "Updated details for the donation camp.",
        "isPublished": true
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
