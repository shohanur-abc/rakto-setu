info:
  name: Delete an announcement
  type: http
  seq: 17
http:
  method: DELETE
  url: '{{baseUrl}}/admin/announcements/:id'
  params:
  - name: id
    value: '{{announcementId}}'
    type: path
  auth:
    type: bearer
    token: '{{admin.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
