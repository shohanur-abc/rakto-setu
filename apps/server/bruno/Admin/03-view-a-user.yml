info:
  name: View a user
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/admin/users/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: "{{donor.id}}"
      type: path
  auth:
    type: bearer
    token: "{{admin.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
