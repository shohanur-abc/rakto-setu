info:
  name: Review reported or flagged content
  type: http
  seq: 18
http:
  method: GET
  url: '{{baseUrl}}/admin/reports/moderation'
  auth:
    type: bearer
    token: '{{admin.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
