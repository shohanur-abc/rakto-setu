info:
  name: Remove a user
  type: http
  seq: 4
http:
  method: DELETE
  url: '{{baseUrl}}/admin/users/:id'
  params:
  - name: id
    value: '{{userId}}'
    type: path
  auth:
    type: bearer
    token: '{{admin.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
