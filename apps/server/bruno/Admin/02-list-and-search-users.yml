info:
  name: List and search users
  type: http
  seq: 2
http:
  method: GET
  url: '{{baseUrl}}/admin/users'
  params:
  - name: page
    value: '{{page}}'
    type: query
    description: Page number, starting at 1
  - name: limit
    value: '{{limit}}'
    type: query
    description: Items per page, capped at 100
  - name: search
    value: rahim
    type: query
    description: Search by name, phone, or email
  auth:
    type: bearer
    token: '{{token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
