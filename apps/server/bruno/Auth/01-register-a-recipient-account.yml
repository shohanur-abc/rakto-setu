info:
  name: Register a recipient account
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "fullName": "Donor Khan",
        "phone": "+8801733336235",
        "email": "donor@example.com",
        "password": "donorPass",
        "bloodGroup": "AB+",
        "preferredLanguage": "bn"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar('user', req.body)
        console.log('saved request user data in user object')
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
