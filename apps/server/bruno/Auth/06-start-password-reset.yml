info:
  name: Start password reset
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/auth/password/forgot"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "phone": "{{user.phone}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const passResetOtp = res.body?.data?.devCode;

        if (passResetOtp) {
          const user = bru.getVar("user");
          user.passResetOtp = passResetOtp;
          bru.setVar("user", user);
          console.log('saved password reset otp as user.passResetOtp')
        }
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
