info:
  name: Start password reset
  type: http
  seq: 6
http:
  method: POST
  url: '{{baseUrl}}/auth/password/forgot'
  auth: none
  body:
    type: json
    data: |-
      {
        "phone": "+8801712345678"
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
