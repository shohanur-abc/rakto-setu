info:
  name: Change password while logged in
  type: http
  seq: 8
http:
  method: POST
  url: '{{baseUrl}}/auth/password/change'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |-
      {
        "currentPassword": "StrongPass123!",
        "newPassword": "NewStrongPass123!"
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
