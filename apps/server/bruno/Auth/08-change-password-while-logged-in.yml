info:
  name: Change password while logged in
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/auth/password/change"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "currentPassword": "{{user.password}}",
        "newPassword": "NewStrongPass123!"
      }
  auth:
    type: bearer
    token: "{{user.token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body.success) {
          const user = bru.getVar("user");
          user.newPassword = req.body.newPassword;
          bru.setVar('user', user)
          console.log('saved new password as user.newPassword')
        }
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
