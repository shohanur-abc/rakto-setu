info:
  name: Get current authenticated user
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/auth/me"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{user.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
