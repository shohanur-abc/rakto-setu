info:
  name: Complete password reset
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/auth/password/reset"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "phone": "{{user.phone}}",
        "code": "{{user.passResetOtp}}",
        "newPassword": "NewVeryStrongPass123!"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body.success) {
          const user = bru.getVar("user");
          user.newPassword = req.body.newPassword;
          bru.setVar('user', user)
          console.log('saved new password as user.newPassword')
        }
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
