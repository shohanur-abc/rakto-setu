info:
  name: Request an OTP code
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/otp/request"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "phone": "{{phone}}"
      }

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
