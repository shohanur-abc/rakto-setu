info:
  name: Verify OTP and activate account
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/auth/otp/verify"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "phone": "+8801712345678",
        "code": "522624"
      }

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
