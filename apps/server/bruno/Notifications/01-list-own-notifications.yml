info:
  name: List own notifications
  type: http
  seq: 1
http:
  method: GET
  url: '{{baseUrl}}/notifications'
  auth:
    type: bearer
    token: '{{user.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
