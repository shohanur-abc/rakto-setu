info:
  name: Mark notification as read
  type: http
  seq: 2
http:
  method: PATCH
  url: '{{baseUrl}}/notifications/:id/read'
  params:
  - name: id
    value: '{{notificationId}}'
    type: path
  auth:
    type: bearer
    token: '{{token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
