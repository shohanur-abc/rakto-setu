info:
  name: Get unread notification count
  type: http
  seq: 4
http:
  method: GET
  url: '{{baseUrl}}/notifications/unread-count'
  auth:
    type: bearer
    token: '{{user.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
