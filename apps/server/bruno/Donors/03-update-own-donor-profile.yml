info:
  name: Update own donor profile
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/donors/profile"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "bloodGroup": "O-",
        "lastDonationDate": "2026-01-10",
        "notes": "Avoid late-night calls"
      }
  auth:
    type: bearer
    token: "{{donor.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
