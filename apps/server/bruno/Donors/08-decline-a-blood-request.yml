info:
  name: Decline a blood request
  type: http
  seq: 8
http:
  method: POST
  url: '{{baseUrl}}/donors/requests/:id/decline'
  params:
  - name: id
    value: '{{requestId}}'
    type: path
  auth:
    type: bearer
    token: '{{donor.token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
