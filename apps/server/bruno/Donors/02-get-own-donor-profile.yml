info:
  name: Get own donor profile
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/donors/profile"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{donor.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
