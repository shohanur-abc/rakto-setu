info:
  name: View matching open blood requests
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/donors/requests"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: locationId
      value: "{{locationId}}"
      type: query
      description: Location filter
      disabled: true
  auth:
    type: bearer
    token: "{{donor.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
