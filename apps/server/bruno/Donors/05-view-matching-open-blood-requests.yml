info:
  name: View matching open blood requests
  type: http
  seq: 5
http:
  method: GET
  url: '{{baseUrl}}/donors/requests'
  params:
  - name: locationId
    value: '{{locationId}}'
    type: query
    description: Location filter
  auth:
    type: bearer
    token: '{{token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
