info:
  name: Confirm donor-side completion
  type: http
  seq: 8
http:
  method: POST
  url: '{{baseUrl}}/donors/requests/:id/confirm-completion'
  params:
  - name: id
    value: '{{requestId}}'
    type: path
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |-
      {
        "units": 1
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
