info:
  name: Register current user as a donor
  type: http
  seq: 1
http:
  method: POST
  url: '{{baseUrl}}/donors/register'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |-
      {
        "bloodGroup": "O+",
        "locationId": "f45f84c9-2685-4c17-bf6d-86de9879a33a",
        "lastDonationDate": "2026-01-10",
        "notes": "Prefers evening calls"
      }
  headers:
  - name: Accept
    value: application/json
  - name: Content-Type
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
