info:
  name: Create a blood request
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/requests"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "patientName": "Rakto Khatun",
        "patientAge": 42,
        "bloodGroup": "B+",
        "unitsNeeded": 1,
        "hospitalName": "Bhangura Health Care",
        "locationId": "3f5d9e54-c39f-4976-b6ee-4b6f13d197a4",
        "urgency": "urgent",
        "neededBy": "2026-08-15T10:00:00.000Z",
        "notes": "Doctor requested donor before surgery."
      }
  auth:
    type: bearer
    token: "{{recipient.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
