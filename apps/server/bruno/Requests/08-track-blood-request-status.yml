info:
  name: Track blood request status
  type: http
  seq: 8
http:
  method: GET
  url: '{{baseUrl}}/requests/:id/status'
  params:
  - name: id
    value: '{{requestId}}'
    type: path
  auth:
    type: bearer
    token: '{{token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
