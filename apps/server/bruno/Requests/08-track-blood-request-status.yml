info:
  name: Track blood request status
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/requests/:id/status"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: 461eda04-3684-4525-b92e-d2c69374e36e
      type: path
  auth:
    type: bearer
    token: "{{recipient.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
