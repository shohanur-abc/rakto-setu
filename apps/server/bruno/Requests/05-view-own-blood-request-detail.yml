info:
  name: View own blood request detail
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/requests/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: 38594909-e3cc-4416-8085-d6d55b4d2917
      type: path
  auth:
    type: bearer
    token: "{{recipient.token}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
