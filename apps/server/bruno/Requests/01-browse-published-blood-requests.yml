info:
  name: Browse published blood requests
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/requests/public?page={{page}}&limit={{limit}}"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: page
      value: "{{page}}"
      type: query
      description: Page number, starting at 1
    - name: limit
      value: "{{limit}}"
      type: query
      description: Items per page, capped at 100
    - name: bloodGroup
      value: "{{bloodGroup}}"
      type: query
      description: Required blood group filter
      disabled: true
    - name: locationId
      value: "{{locationId}}"
      type: query
      description: Location filter
      disabled: true
    - name: urgency
      value: urgent
      type: query
      description: Urgency filter
      disabled: true

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: 200,201

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
