info:
  name: List own blood requests
  type: http
  seq: 4
http:
  method: GET
  url: '{{baseUrl}}/requests'
  params:
  - name: page
    value: '{{page}}'
    type: query
    description: Page number, starting at 1
  - name: limit
    value: '{{limit}}'
    type: query
    description: Items per page, capped at 100
  - name: bloodGroup
    value: '{{bloodGroup}}'
    type: query
    description: Required blood group filter
  - name: locationId
    value: '{{locationId}}'
    type: query
    description: Location filter
  - name: urgency
    value: urgent
    type: query
    description: Urgency filter
  auth:
    type: bearer
    token: '{{token}}'
  headers:
  - name: Accept
    value: application/json
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  assertions:
  - expression: res.status
    operator: in
    value: 200,201
