services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    environment:
      PORT: "5000"
      CORS_ORIGINS: "http://localhost:5173"
    ports:
      - "5050:5000"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    environment:
      PROXY_TARGET: "http://server:5000"
    ports:
      - "5173:5173"
    depends_on:
      - server
